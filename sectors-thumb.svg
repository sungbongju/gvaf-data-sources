<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#0f1e3d"/>
      <stop offset="1" stop-color="#102a43"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="-8%" r="75%">
      <stop offset="0" stop-color="#16335f" stop-opacity="0.95"/>
      <stop offset="0.6" stop-color="#16335f" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#7dd3fc" opacity="0.10"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- eyebrow -->
  <text x="80" y="130" fill="#7dd3fc" font-size="25" font-weight="700" letter-spacing="2">GVAF · 시나리오별 산업 부가가치 전망 2025–2035</text>

  <!-- title -->
  <text x="78" y="236" fill="#f8fafc" font-size="74" font-weight="800" letter-spacing="-1.5">광공업 · 서비스업 부문 조사</text>

  <!-- subtitle -->
  <text x="80" y="302" fill="#cbd5e1" font-size="28" font-weight="500">본 연구가 전망하는 약 70개 산업의 두 주력 부문.</text>
  <text x="80" y="342" fill="#cbd5e1" font-size="28" font-weight="500">구성 · 부가가치 비중 · 데이터 출처 · 신산업 위치 · 전망 특성을 종합.</text>

  <!-- chip row 1 (stats) -->
  <g font-size="24" font-weight="700">
    <rect x="80"  y="390" width="220" height="52" rx="26" fill="#1e293b" fill-opacity="0.85" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="104" y="424" fill="#e2e8f0">🏭 제조업 <tspan fill="#7dd3fc" font-weight="800">~27%</tspan></text>
    <rect x="314" y="390" width="240" height="52" rx="26" fill="#1e293b" fill-opacity="0.85" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="338" y="424" fill="#e2e8f0">🏪 서비스업 <tspan fill="#7dd3fc" font-weight="800">~58%</tspan></text>
    <rect x="568" y="390" width="216" height="52" rx="26" fill="#1e293b" fill-opacity="0.85" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="592" y="424" fill="#e2e8f0">두 부문 합 <tspan fill="#7dd3fc" font-weight="800">~85%</tspan></text>
    <rect x="798" y="390" width="196" height="52" rx="26" fill="#1e293b" fill-opacity="0.85" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="822" y="424" fill="#e2e8f0">제안서 분류 기준</text>
  </g>

  <!-- chip row 2 (nav) -->
  <g font-size="22" font-weight="700">
    <rect x="80"  y="458" width="218" height="48" rx="24" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="103" y="489" fill="#e2e8f0">📊 통계 정보원 정리</text>
    <rect x="312" y="458" width="136" height="48" rx="24" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="335" y="489" fill="#e2e8f0">🏭 광공업</text>
    <rect x="462" y="458" width="152" height="48" rx="24" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="485" y="489" fill="#e2e8f0">🏪 서비스업</text>
    <rect x="628" y="458" width="116" height="48" rx="24" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="651" y="489" fill="#e2e8f0">⚖️ 비교</text>
    <rect x="758" y="458" width="160" height="48" rx="24" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="781" y="489" fill="#e2e8f0">🎯 전망 함의</text>
  </g>
</svg>
