<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff4e0"/>
      <stop offset="0.6" stop-color="#ffe6ef"/>
      <stop offset="1" stop-color="#f3ecff"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff7a86"/>
      <stop offset="1" stop-color="#ff5fa2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- little shops row -->
  <g transform="translate(80,150)">
    <!-- shop template: awning + body -->
    <g>
      <rect x="0" y="40" width="150" height="150" rx="16" fill="#ffffff" stroke="#ffd6a8"/>
      <rect x="-6" y="22" width="162" height="34" rx="10" fill="#ff8a3d"/>
      <rect x="20" y="40" width="34" height="34" rx="6" fill="#ffe6ef"/>
      <rect x="58" y="40" width="34" height="34" rx="6" fill="#ffe6ef"/>
      <rect x="96" y="40" width="34" height="34" rx="6" fill="#ffe6ef"/>
      <rect x="55" y="110" width="40" height="80" rx="6" fill="#ff5fa2"/>
      <text x="75" y="225" text-anchor="middle" font-size="34">🍽️</text>
    </g>
    <g transform="translate(200,0)">
      <rect x="0" y="40" width="150" height="150" rx="16" fill="#ffffff" stroke="#ffd6a8"/>
      <rect x="-6" y="22" width="162" height="34" rx="10" fill="#ff5fa2"/>
      <rect x="30" y="70" width="90" height="60" rx="8" fill="#ede7ff"/>
      <rect x="55" y="130" width="40" height="60" rx="6" fill="#ffc24a"/>
      <text x="75" y="225" text-anchor="middle" font-size="34">🎮</text>
    </g>
    <g transform="translate(400,0)">
      <rect x="0" y="40" width="150" height="150" rx="16" fill="#ffffff" stroke="#ffd6a8"/>
      <rect x="-6" y="22" width="162" height="34" rx="10" fill="#ff9f5a"/>
      <rect x="60" y="58" width="30" height="100" rx="6" fill="#ff5fa2"/>
      <rect x="35" y="83" width="80" height="30" rx="6" fill="#ff5fa2"/>
      <text x="75" y="225" text-anchor="middle" font-size="34">🏥</text>
    </g>
    <g transform="translate(600,0)">
      <rect x="0" y="40" width="150" height="150" rx="16" fill="#ffffff" stroke="#ffd6a8"/>
      <rect x="-6" y="22" width="162" height="34" rx="10" fill="#ff7a86"/>
      <rect x="38" y="66" width="74" height="120" rx="14" fill="#ede7ff"/>
      <rect x="50" y="80" width="50" height="78" rx="6" fill="#ffffff"/>
      <circle cx="75" cy="172" r="6" fill="#ff5fa2"/>
      <text x="75" y="225" text-anchor="middle" font-size="34">📱</text>
    </g>
  </g>

  <!-- title -->
  <text x="80" y="455" font-size="74" font-weight="800" fill="url(#title)">서비스업조사가 뭐예요?</text>
  <text x="82" y="510" font-size="33" font-weight="600" fill="#7a736e">가게·회사한테 “장사 잘 됐어요?” 매년 물어보는 조사</text>

  <!-- chips -->
  <g font-size="25" font-weight="700">
    <rect x="80" y="545" width="150" height="50" rx="25" fill="#fff1e0" stroke="#ffd6a8"/>
    <text x="110" y="578" fill="#d9711f">매년 조사</text>
    <rect x="246" y="545" width="232" height="50" rx="25" fill="#fff1e0" stroke="#ffd6a8"/>
    <text x="276" y="578" fill="#d9711f">약 25만 개 사업체</text>
    <rect x="494" y="545" width="330" height="50" rx="25" fill="#ffe6ef" stroke="#ffc0d6"/>
    <text x="524" y="578" fill="#c93b73">콘텐츠·플랫폼·헬스케어</text>
  </g>

  <text x="1120" y="595" text-anchor="end" font-size="22" font-weight="700" fill="#b9a9c9">초등학생도 아는 쉬운 설명</text>
</svg>
