<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#0f1e3d"/>
      <stop offset="1" stop-color="#102a43"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#7dd3fc" opacity="0.10"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="1200" height="8" fill="url(#accent)"/>

  <!-- eyebrow -->
  <text x="80" y="118" fill="#7dd3fc" font-size="25" font-weight="700" letter-spacing="2">
    GVAF · 시나리오별 산업 부가가치 전망 2025–2035
  </text>

  <!-- title -->
  <text x="78" y="232" fill="#f8fafc" font-size="84" font-weight="800" letter-spacing="-1">신산업, 어디서</text>
  <text x="78" y="332" fill="#f8fafc" font-size="84" font-weight="800" letter-spacing="-1">데이터를 얻나</text>

  <!-- subtitle -->
  <text x="80" y="404" fill="#cbd5e1" font-size="33" font-weight="500">광업·제조업조사 · 산업연관표 — 통계 정보원 정리</text>

  <!-- chips -->
  <g font-size="25" font-weight="700">
    <rect x="80" y="452" width="232" height="58" rx="29" fill="#1e293b" stroke="#334155"/>
    <text x="110" y="490" fill="#e2e8f0">세세분류 1,205개</text>
    <rect x="328" y="452" width="150" height="58" rx="29" fill="#1e293b" stroke="#334155"/>
    <text x="360" y="490" fill="#e2e8f0">매년 조사</text>
    <rect x="494" y="452" width="186" height="58" rx="29" fill="#1e293b" stroke="#334155"/>
    <text x="524" y="490" fill="#e2e8f0">부가가치 수록</text>
  </g>

  <!-- right panel: KSIC depth ladder -->
  <g transform="translate(820,150)">
    <text x="0" y="-18" fill="#94a3b8" font-size="22" font-weight="700" letter-spacing="1">KSIC 분류 해상도</text>
    <g font-size="22" font-weight="700">
      <rect x="0" y="8"   width="120" height="44" rx="8" fill="url(#bar)" opacity="0.45"/>
      <text x="134" y="38" fill="#e2e8f0">대분류 21</text>
      <rect x="0" y="66"  width="170" height="44" rx="8" fill="url(#bar)" opacity="0.55"/>
      <text x="184" y="96" fill="#e2e8f0">중분류 77</text>
      <rect x="0" y="124" width="220" height="44" rx="8" fill="url(#bar)" opacity="0.68"/>
      <text x="234" y="154" fill="#e2e8f0">소분류 234</text>
      <rect x="0" y="182" width="262" height="44" rx="8" fill="url(#bar)" opacity="0.82"/>
      <text x="276" y="212" fill="#e2e8f0">세분류 501</text>
      <rect x="0" y="240" width="300" height="44" rx="8" fill="url(#bar)"/>
      <text x="20" y="270" fill="#0b1220" font-weight="800">세세분류 1,205</text>
    </g>
  </g>

  <!-- footer line -->
  <text x="80" y="582" fill="#64748b" font-size="22" font-weight="600">반도체 · 이차전지 · 바이오의약 — 세분류로 추적 가능한 통계 기반</text>
</svg>
